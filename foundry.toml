[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200

remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

# Verbose test output by default
verbosity = 3

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false

[fuzz]
runs = 256
